<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feria Gigi</title>
    <link rel="stylesheet" href="../css/styles.css">
    </head>
<body class="feria-page">
    <!-- Header space -->
    <div class="header-space">
        <div class="header-links">
            <a href="../index.html" class="header-link">Home</a>
            <span class="header-link-divider">|</span>
            <a href="#" class="header-link menu-toggle" onclick="toggleMenu()">Menú</a>
            <span class="header-link-divider">|</span>
            <a href="contact.html" class="header-link">Contactanos</a>
        </div>
    </div>
    
    <!-- Navigation Menu -->
    <nav class="nav-menu" id="navMenu">
        <div class="close-btn" onclick="toggleMenu()">×</div>
        <div class="nav-content">
            <ul>
                <li><a href="feria.html">Feria Gigi</a></li>
                <li><a href="cupones.html">Cupones descuento</a></li>
                <li><a href="mercado_libre.html">Mercado libre</a></li>
                <li><a href="juegos.html">Juegos Imprimibles</a></li>
            </ul>
        </div>
    </nav>
    
    <!-- Content -->
    <div class="content">
        <h1>FERIA GIGI</h1>
        
        <!-- Filter Buttons -->
        <div class="filter-container">
            <button class="filter-btn active" data-filter="all">Todos</button>
            <button class="filter-btn" data-filter="nuevo">Nuevo</button>
            <button class="filter-btn" data-filter="usado">Usado</button>
        </div>
        
        <!-- Products Grid -->
        <div id="productsGrid" class="products-grid">
            <!-- Products will be loaded here dynamically -->
        </div>
    </div>
    
    <!-- Footer -->
    <footer>
        <p>© 2026 Gigi Lucero</p>
    </footer>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script src="../js/script.js"></script>
<script>
let allProducts = [];

// Load products from feria.json
async function loadProducts() {
    try {
        const response = await fetch('../assets/feria.json');
        allProducts = await response.json();
        
        displayProducts(allProducts);
        setupFilterButtons();
    } catch (error) {
        console.error('Error loading products:', error);
    }
}

// Display products in the grid
function displayProducts(products) {
    const productsGrid = document.getElementById('productsGrid');
    productsGrid.innerHTML = '';
    
    products.forEach(product => {
        const productItem = document.createElement('div');
        productItem.className = 'product-item';
        productItem.dataset.status = product.status || 'nuevo';
        
        productItem.innerHTML = `
            <a href="producto_feria.html?id=${product.id}">
                <img src="../${product.image_path}" alt="${product.title}">
            </a>
            <h3>${product.title}</h3>
            <div class="product-info">
                ${product.size ? `<span class="product-size">talle ${product.size}</span>` : ''}
                <p class="product-price">$${product.price.toLocaleString()}</p>
            </div>
        `;
        
        productsGrid.appendChild(productItem);
    });
}

// Setup filter button event listeners
function setupFilterButtons() {
    const filterButtons = document.querySelectorAll('.filter-btn');
    
    filterButtons.forEach(button => {
        button.addEventListener('click', function() {
            // Remove active class from all buttons
            filterButtons.forEach(btn => btn.classList.remove('active'));
            // Add active class to clicked button
            this.classList.add('active');
            
            const filterValue = this.dataset.filter;
            filterProducts(filterValue);
        });
    });
}

// Filter products based on selected status
function filterProducts(filterValue) {
    let filteredProducts;
    
    if (filterValue === 'all') {
        filteredProducts = allProducts;
    } else {
        filteredProducts = allProducts.filter(product => 
            (product.status || 'nuevo') === filterValue
        );
    }
    
    displayProducts(filteredProducts);
}

// Load products when page loads
document.addEventListener('DOMContentLoaded', loadProducts);
</script>
</body>
</html>
