<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feria Gigi</title>
    <link rel="stylesheet" href="../css/styles.css">
    </head>
<body>
    <!-- Header space -->
    <div class="header-space">
        <div class="menu-toggle" onclick="toggleMenu()">
            <span></span>
            <span></span>
            <span></span>
        </div>
    </div>
    
    <!-- Navigation Menu -->
    <nav class="nav-menu" id="navMenu">
        <div class="close-btn" onclick="toggleMenu()">×</div>
        <div class="nav-content">
            <ul>
                <li><a href="../index.html">Home</a></li>
                <li><a href="feria.html">Feria Gigi</a></li>
                <li><a href="cupones.html">Cupones descuento</a></li>
                <li><a href="mercado_libre.html">Mercado libre</a></li>
                <li><a href="locales.html">Locales Flores</a></li>
                <li><a href="contact.html">Contactanos</a></li>
            </ul>
        </div>
    </nav>
    
    <!-- Content -->
    <div class="content">
        <h1>FERIA GIGI</h1>
        
        <!-- Products Grid -->
        <div id="productsGrid" class="products-grid">
            <!-- Products will be loaded here dynamically -->
        </div>
    </div>
    
    <!-- Footer -->
    <footer>
        <p>© 2026 Gigi Lucero</p>
    </footer>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script src="../js/script.js"></script>
<script>
// Load products from feria.json
async function loadProducts() {
    try {
        const response = await fetch('../assets/feria.json');
        const products = await response.json();
        
        const productsGrid = document.getElementById('productsGrid');
        
        products.forEach(product => {
            const productItem = document.createElement('div');
            productItem.className = 'product-item';
            
            productItem.innerHTML = `
                <a href="producto_feria.html">
                    <img src="../${product.image_path}" alt="${product.title}">
                </a>
                <h3>${product.title}</h3>
            `;
            
            productsGrid.appendChild(productItem);
        });
    } catch (error) {
        console.error('Error loading products:', error);
    }
}

// Load products when page loads
document.addEventListener('DOMContentLoaded', loadProducts);
</script>
</body>
</html>
